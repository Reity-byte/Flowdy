name: Build Flowdy (Multiplatform)

on:
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        # Přidali jsme ubuntu-latest pro sestavení Androidu
        platform: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Stáhnutí kódu
        uses: actions/checkout@v4

      - name: Instalace Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalace Rustu
        uses: dtolnay/rust-toolchain@stable

      # Speciální krok jen pro Android (běží na Ubuntu)
      - name: Instalace Android SDK
        if: matrix.platform == 'ubuntu-latest'
        uses: android-actions/setup-android@v3

      - name: Instalace NPM balíčků
        run: npm install

      - name: Sestavení aplikací
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.2.0
          releaseName: 'Flowdy v0.2.0'
          releaseDraft: true
          prerelease: false
          # Tady říkáme, co se má na které platformě stavět
          args: ${{ matrix.platform == 'ubuntu-latest' && '--target aarch64-linux-android' || '' }}