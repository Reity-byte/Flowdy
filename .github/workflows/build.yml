name: Build Flowdy

on:
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Stáhnutí kódu
        uses: actions/checkout@v4

      - name: Instalace Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalace Rustu
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'ubuntu-latest' && 'aarch64-linux-android' || '' }}

      # NASTAVENÍ ANDROIDU (Změna: používáme ověřenou akci pro nastavení NDK)
      - name: Setup Android NDK
        if: matrix.platform == 'ubuntu-latest'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c # Stabilní verze pro Tauri

      - name: Instalace Javy
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Accept Android Licenses
        if: matrix.platform == 'ubuntu-latest'
        run: yes | sdkmanager --licenses || true

      - name: Instalace NPM balíčků
        run: npm install

      - name: Tauri Android Init
        if: matrix.platform == 'ubuntu-latest'
        run: npx tauri android init

      - name: Sestavení aplikací
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tato proměnná je klíčová pro linker v Rustu
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        with:
          tagName: v0.2.4
          releaseName: 'Flowdy v0.2.4'
          releaseBody: 'Android Build s fixnutým NDK Toolchainem.'
          releaseDraft: true
          prerelease: false
          # Přidali jsme argument, který vynutí správný linker
          args: ${{ matrix.platform == 'ubuntu-latest' && '--target aarch64-linux-android' || '' }}