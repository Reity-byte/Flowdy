name: Release All Platforms

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # 1. JOB: Desktop (Windows, MacOS, Linux)
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install NPM dependencies
        run: npm install

      - name: Build Desktop Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # Verze se vezme z package.json
          releaseName: "Flowdy v__VERSION__"
          releaseBody: "Automatický build pro desktop a Android."
          releaseDraft: true
          prerelease: false

  # 2. JOB: Android
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (with Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: false

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NPM dependencies
        run: npm install

      - name: Tauri Android Init and Icons
        # Spustí se pouze pokud složka gen/android neexistuje
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            npx tauri android init
          fi
          npx tauri icon icon.png

      - name: Build Android APK
        run: npx tauri android build --debug
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v0.4.4 # Upravte dle potřeby nebo použijte dynamické tagování
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          draft: true