name: Build Flowdy

on:
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Stáhnutí kódu
        uses: actions/checkout@v4

      - name: Instalace Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalace Rustu
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'ubuntu-latest' && 'aarch64-linux-android' || '' }}

      - name: Instalace Javy a Android SDK
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Accept Android Licenses
        if: matrix.platform == 'ubuntu-latest'
        run: yes | sdkmanager --licenses || true

      - name: Instalace NPM balíčků
        run: npm install

      # Vytvoříme konfigurační soubory pro Android, pokud neexistují
      - name: Tauri Android Init
        if: matrix.platform == 'ubuntu-latest'
        run: npx tauri android init

      - name: Sestavení aplikací
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tady říkáme linkeru, kde má hledat Android nástroje
          NDK_HOME: ${{ steps.setup-android.outputs.ndk-path }}
        with:
          tagName: v0.2.3
          releaseName: 'Flowdy v0.2.3'
          releaseBody: 'Snad už finální oprava linkeru pro Android.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'ubuntu-latest' && '--target aarch64-linux-android' || '' }}